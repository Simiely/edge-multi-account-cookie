<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cookie Switcher 设置</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --surface-hover: #1a2750;
      --primary: #ff9292;
      --primary-hover: #e67a7a;
      --danger: #e74c3c;
      --text: #e0e0e0;
      --text-secondary: #a0a0b0;
      --border: #2a2a4a;
      --radius: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      font-size: 14px;
      padding: 24px;
      max-width: 600px;
      margin: 0 auto;
      overflow-y: scroll;
    }

    h1 {
      font-size: 20px;
      color: var(--primary);
      margin-bottom: 24px;
    }

    .section {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid var(--border);
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text);
    }

    .section-desc {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .form-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .form-row label {
      font-size: 13px;
      min-width: 70px;
      flex-shrink: 0;
    }

    .form-row input[type="text"],
    .form-row input[type="password"],
    .form-row input[type="number"] {
      flex: 1;
      padding: 8px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
      outline: none;
    }
    .form-row input:focus {
      border-color: var(--primary);
    }
    .form-row input::placeholder {
      color: var(--text-secondary);
    }

    .toggle {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 22px;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--border);
      border-radius: 22px;
    }
    .toggle .slider::before {
      content: '';
      position: absolute;
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background: var(--text);
      border-radius: 50%;
    }
    .toggle input:checked + .slider {
      background: var(--primary);
    }
    .toggle input:checked + .slider::before {
      transform: translateX(18px);
    }
    .toggle input:checked + .slider {
      background: var(--primary);
    }
    .toggle input:checked + .slider::before {
      transform: translateX(18px);
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-outline:hover { background: var(--surface-hover); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }

    .domain-list { margin-top: 8px; }
    .domain-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      background: var(--bg);
      border-radius: 4px;
      margin-bottom: 4px;
      font-size: 13px;
      font-family: monospace;
    }
    .domain-item .remove-btn {
      cursor: pointer;
      color: var(--danger);
      background: none;
      border: none;
      font-size: 14px;
    }

    .status-msg {
      margin-top: 8px;
      padding: 8px 10px;
      border-radius: 4px;
      font-size: 12px;
      display: none;
    }
    .status-msg.show { display: block; }
    .status-msg.success {
      background: rgba(46,204,113,0.15);
      color: #2ecc71;
      border: 1px solid rgba(46,204,113,0.3);
    }
    .status-msg.error {
      background: rgba(231,76,60,0.15);
      color: #e74c3c;
      border: 1px solid rgba(231,76,60,0.3);
    }

    .hidden { display: none !important; }

    .file-input-wrapper {
      position: relative;
      overflow: hidden;
      display: inline-block;
    }
    .file-input-wrapper input[type="file"] {
      position: absolute;
      left: 0; top: 0;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>⚙️ Cookie Switcher 设置</h1>

<!-- Security: PIN Lock -->
<div class="section">
  <div class="section-title">🔒 密码锁</div>
  <div class="section-desc">开启后，打开扩展弹窗需输入密码验证</div>

  <div class="form-row">
    <label>启用密码锁</label>
    <label class="toggle">
      <input type="checkbox" id="pinEnabled" />
      <span class="slider"></span>
    </label>
  </div>

  <div id="pinConfig" class="hidden">
    <div class="form-row" id="pinCurrentRow">
      <label>当前密码</label>
      <input type="password" id="pinCurrent" placeholder="输入当前密码" />
    </div>
    <div class="form-row">
      <label>新密码</label>
      <input type="password" id="pinNew" placeholder="自定义密码" />
    </div>
    <div class="form-row">
      <label>确认密码</label>
      <input type="password" id="pinConfirm" placeholder="再次输入密码" />
    </div>
    <button class="btn btn-primary" id="btnSavePin">保存密码设置</button>
  </div>

  <div class="status-msg" id="pinStatus"></div>
</div>

<!-- Domain Whitelist -->
<div class="section">
  <div class="section-title">🌐 域名白名单</div>
  <div class="section-desc">仅白名单中的域名可进行操作。留空则允许所有域名。</div>

  <div class="form-row">
    <input type="text" id="inputDomain" placeholder="输入域名，如 example.com" />
    <button class="btn btn-primary btn-sm" id="btnAddDomain">添加</button>
  </div>

  <div class="domain-list" id="domainList"></div>
  <div class="status-msg" id="domainStatus"></div>
</div>

<!-- Export/Import -->
<div class="section">
  <div class="section-title">📦 数据备份</div>
  <div class="section-desc">数据使用 AES-GCM 加密导出，导入时需输入正确的密码。</div>

  <div class="form-row" style="flex-wrap:wrap; gap:8px;">
    <button class="btn btn-primary" id="btnExport">📤 导出数据（加密）</button>
    <div class="file-input-wrapper">
      <button class="btn btn-outline">📥 导入数据</button>
      <input type="file" id="fileInput" accept=".json" />
    </div>
  </div>

  <div class="status-msg" id="backupStatus"></div>
</div>

<script src="utils.js"></script>
<script src="options.js"></script>
</body>
</html>
